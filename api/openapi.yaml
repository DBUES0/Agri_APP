openapi: 3.0.0


info:
  title: AgriAPI
  description: API para la gestión agrícola, incluyendo autenticación, gastos, albaranes, archivos, fincas, trabajadores, operaciones y endpoints genéricos para manipulación de tablas.
  version: 1.0.0

servers:
  - url: https://api.bueso.duckdns.org
    description: Servidor de producción
  - url: http://192.168.1.224
    description: Servidor local de desarrollo
  - url: https://apitest.bueso.duckdns.org
    description: Servidor de test
  - url: http://192.168.1.221
    description: Servidor local de test


security:
  - bearerAuth: []

tags:
  - name: Autenticación
    description: Operaciones de login y generación de tokens
  - name: Gastos
    description: Gestión de gastos agrícolas
  - name: Albaranes
    description: Gestión de albaranes (cabecera y detalles)
  - name: Archivos
    description: Subida y descarga de archivos
  - name: Fincas
    description: Gestión de fincas agrícolas
  - name: Trabajadores
    description: Gestión de trabajadores y jornadas
  - name: Operaciones
    description: Gestión de operaciones agrícolas
  - name: Genéricas
    description: Endpoints genéricos para crear, editar, listar y eliminar registros en tablas


paths:
  /api/admin/unlock/{identificador}:
    post:
      summary: Desbloquear un usuario bloqueado
      description: Solo administradores pueden desbloquear usuarios bloqueados por intentos fallidos de login. El identificador puede ser un UUID, correo electrónico o ID de Telegram.
      tags: [Autenticación]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: identificador
          schema:
            type: string
          required: true
          description: UUID, correo electrónico o ID de Telegram del usuario a desbloquear
      responses:
        '200':
          description: Usuario desbloqueado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario desbloqueado correctamente
        '403':
          description: No autorizado (solo administradores)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No autorizado. Solo administradores pueden desbloquear usuarios.
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Usuario no encontrado

  /api/login:
    post:
      tags: [Autenticación]
      summary: Autenticar un usuario y generar un token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: davidbueso@gmail.com
                password:
                  type: string
                  example: 1234a*
              required: [email, password]
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Token JWT para autenticación
                    example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                  usuario:
                    type: object
                    properties:
                      fechaCreacion_dtm:
                        type: string
                        format: date-time
                        description: Fecha de creación del usuario
                        example: "2025-04-02 07:37:51"
                      nombre_str:
                        type: string
                        description: Nombre del usuario
                        example: "Prueba"
                      apellidos_str:
                        type: string
                        description: Apellidos del usuario
                        example: "Pruebez"
                      dni_str:
                        type: string
                        description: Documento de identidad del usuario
                        example: "123456789x"
                      direccion_str:
                        type: string
                        description: Dirección del usuario
                        example: "213"
                      email_str:
                        type: string
                        format: email
                        description: Correo electrónico del usuario
                        example: "davidbueso@gmail.com"
                      telefono_str:
                        type: string
                        description: Teléfono del usuario
                        example: "619318257"
                      validado_bit:
                        type: integer
                        description: Indica si el usuario ha sido validado (1 = sí, 0 = no)
                        example: 1
                      campo1_str:
                        type: string
                        nullable: true
                        description: Campo adicional
                        example: null
                      telegramid_str:
                        type: string
                        nullable: true
                        description: ID de Telegram del usuario
                        example: null
                      activado_bit:
                        type: integer
                        nullable: true
                        description: Estado de activación del usuario
                        example: null
                      bloqueado_bit:
                        type: integer
                        description: Indica si el usuario está bloqueado (1 = sí, 0 = no)
                        example: 0
                      numintentos_int:
                        type: integer
                        description: Número de intentos de inicio de sesión
                        example: 0
                      ultimointentologin_dtm:
                        type: string
                        format: date-time
                        description: Último intento de inicio de sesión
                        example: "2025-05-21 21:31:38"
                      ktipodeusuario:
                        type: string
                        description: Identificador del tipo de usuario
                        example: "af7a6cb3-1912-11f0-9fba-e2b6c6b4d8df"
                      eliminado_bit:
                        type: integer
                        description: Indica si el usuario ha sido eliminado (1 = sí, 0 = no)
                        example: 0
                      fechaeliminacion_dtm:
                        type: string
                        nullable: true
                        format: date-time
                        description: Fecha de eliminación del usuario
                        example: null
        '400':
          description: Faltan credenciales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /:
    get:
      tags: [Autenticación]
      summary: Obtener la página de documentación
      responses:
        '200':
          description: Página de documentación en HTML
          content:
            text/html:
              schema:
                type: string

  /swagger.json:
    get:
      tags: [Autenticación]
      summary: Obtener la especificación OpenAPI
      responses:
        '200':
          description: Especificación OpenAPI en JSON
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Archivo Swagger no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/gastos:
    get:
      tags: [Gastos]
      summary: Obtener todos los gastos del agricultor autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de gastos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Gasto'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Gastos]
      summary: Crear un nuevo gasto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GastoInput'
      responses:
        '200':
          description: Gasto creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Nuevo gasto insertado correctamente
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albarancabecera:
    post:
      tags: [Albaranes]
      summary: Crear una nueva cabecera de albarán
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbaranCabeceraInput'
      responses:
        '200':
          description: Cabecera de albarán creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Cabecera de albarán creada correctamente
                  kalbaran:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
                  nuevoid:
                    type: integer
                    example: 1
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albarandetalles:
    post:
      tags: [Albaranes]
      summary: Añadir un detalle a un albarán
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbaranDetalleInput'
      responses:
        '201':
          description: Detalle de albarán creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Detalle de albarán creado correctamente
                  detalle:
                    $ref: '#/components/schemas/AlbaranDetalle'
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albarandetalles/{kalbaran}:
    get:
      tags: [Albaranes]
      summary: Obtener los detalles de un albarán específico
      security:
        - bearerAuth: []
      parameters:
        - name: kalbaran
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Lista de detalles del albarán
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlbaranDetalle'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Albarán no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/albaranes:
    get:
      tags: [Albaranes]
      summary: Obtener todos los albaranes de un agricultor con sus detalles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de albaranes con sus detalles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlbaranConDetalles'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No se encontraron albaranes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/mergealbaran:
    post:
      tags: [Albaranes]
      summary: Crea o actualiza un albarán con sus detalles y archivos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AlbaranMerge'
      responses:
        '200':
          description: Albarán procesado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: JSON inválido
        '500':
          description: Error del servidor
  /api/albaranesv2:
    get:
      summary: Obtener todos los albaranes del agricultor autenticado (v2)
      tags: [Albaranes]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de albaranes con detalles y archivos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlbaranCompleto'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /api/listar/productos:
    get:
      tags: [Albaranes]
      summary: Listar productos ordenados por uso frecuente del agricultor
      description: Devuelve la lista completa de productos, priorizando aquellos utilizados en albaranes recientes por el agricultor autenticado.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de productos ordenada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductoOrdenado'
        '401':
          $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/schemas/ErrorResponse'

  /api/archivo:
    post:
      tags: [Archivos]
      summary: Subir un archivo a la base de datos y NAS
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                archivo:
                  type: string
                  format: binary
                  description: Archivo a subir
                kuuid:
                  type: string
                  description: Identificador único del archivo
                  example: 123e4567-e89b-12d3-a456-426614174000
                tipo:
                  type: string
                  description: Tipo de archivo
                  example: documento
              required: [archivo, kuuid, tipo]
      responses:
        '200':
          description: Archivo subido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Archivo subido correctamente
                  uuid:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          description: Faltan parámetros o archivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/gastos/descargararchivo/{id}:
    get:
      tags: [Archivos]
      summary: Descargar un archivo desde la base de datos por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Archivo descargado
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Archivo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/gastos/descargararchivonas/{id}:
    get:
      tags: [Archivos]
      summary: Descargar un archivo desde el NAS por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Archivo descargado
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Ruta no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Archivo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/crearfinca:
    post:
      tags: [Fincas]
      summary: Crear una nueva finca
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FincaInput'
      responses:
        '200':
          description: Finca creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Finca creada correctamente
                  kfinca:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/finca:
    put:
      tags: [Fincas]
      summary: Modificar una finca existente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FincaUpdate'
      responses:
        '200':
          description: Finca modificada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Finca modificada correctamente
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/finca/{kfinca}:
    delete:
      tags: [Fincas]
      summary: Eliminar una finca (borrado físico)
      security:
        - bearerAuth: []
      parameters:
        - name: kfinca
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Finca eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Finca eliminada correctamente
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fincas:
    get:
      tags: [Fincas]
      summary: Listar todas las fincas del agricultor autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de fincas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Finca'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trabajadores/activos:
    get:
      tags: [Trabajadores]
      summary: Listar trabajadores activos a la fecha actual
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de trabajadores activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trabajador'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trabajadores/activos/{fecha}:
    get:
      tags: [Trabajadores]
      summary: Listar trabajadores activos en una fecha específica
      security:
        - bearerAuth: []
      parameters:
        - name: fecha
          in: path
          required: true
          schema:
            type: string
            format: date
            example: 2025-04-24
      responses:
        '200':
          description: Lista de trabajadores activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trabajador'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trabajadores/insertarjornada:
    post:
      tags: [Trabajadores]
      summary: Insertar una nueva jornada para un trabajador
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ktrabajador:
                  type: string
                  example: 123e4567-e89b-12d3-a456-426614174000
                fecha:
                  type: string
                  format: date
                  example: 2025-04-24
              required: [ktrabajador]
      responses:
        '200':
          description: Jornada insertada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Jornada insertada correctamente
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Jornada ya existente para el trabajador y fecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
