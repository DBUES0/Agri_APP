openapi: 3.1.0

info:
  title: AgriAPI
  description: API para la gestión agrícola, incluyendo autenticación, gastos, albaranes, archivos, fincas, trabajadores, operaciones y endpoints genéricos para manipulación de tablas.
  version: 1.0.0

servers:
  - url: http://192.168.1.224
    description: Servidor local de desarrollo
  - url: https://api.bueso.duckdns.org
    description: Servidor de producción

security:
  - bearerAuth: []

tags:
  - name: Autenticación
    description: Operaciones de login y generación de tokens
  - name: Gastos
    description: Gestión de gastos agrícolas
  - name: Albaranes
    description: Gestión de albaranes (cabecera y detalles)
  - name: Archivos
    description: Subida y descarga de archivos
  - name: Fincas
    description: Gestión de fincas agrícolas
  - name: Trabajadores
    description: Gestión de trabajadores y jornadas
  - name: Operaciones
    description: Gestión de operaciones agrícolas
  - name: Genéricas
    description: Endpoints genéricos para crear, editar, listar y eliminar registros en tablas

paths:
  /api/login:
    post:
      tags: [Autenticación]
      summary: Autenticar un usuario y generar un token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: davidbueso@gmail.com
                password:
                  type: string
                  example: 1234a*
              required: [email, password]
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Token JWT para autenticación
                    example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
        '400':
          description: Faltan credenciales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /:
    get:
      tags: [Autenticación]
      summary: Obtener la página de documentación
      responses:
        '200':
          description: Página de documentación en HTML
          content:
            text/html:
              schema:
                type: string

  /swagger.json:
    get:
      tags: [Autenticación]
      summary: Obtener la especificación OpenAPI
      responses:
        '200':
          description: Especificación OpenAPI en JSON
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Archivo Swagger no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/gastos:
    get:
      tags: [Gastos]
      summary: Obtener todos los gastos del agricultor autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de gastos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Gasto'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Gastos]
      summary: Crear un nuevo gasto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GastoInput'
      responses:
        '200':
          description: Gasto creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Nuevo gasto insertado correctamente
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albarancabecera:
    post:
      tags: [Albaranes]
      summary: Crear una nueva cabecera de albarán
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbaranCabeceraInput'
      responses:
        '200':
          description: Cabecera de albarán creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Cabecera de albarán creada correctamente
                  kalbaran:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
                  nuevoid:
                    type: integer
                    example: 1
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albarandetalles:
    post:
      tags: [Albaranes]
      summary: Añadir un detalle a un albarán
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbaranDetalleInput'
      responses:
        '201':
          description: Detalle de albarán creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Detalle de albarán creado correctamente
                  detalle:
                    $ref: '#/components/schemas/AlbaranDetalle'
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albarandetalles/{kalbaran}:
    get:
      tags: [Albaranes]
      summary: Obtener los detalles de un albarán específico
      security:
        - bearerAuth: []
      parameters:
        - name: kalbaran
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Lista de detalles del albarán
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlbaranDetalle'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Albarán no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/archivo:
    post:
      tags: [Archivos]
      summary: Subir un archivo a la base de datos y NAS
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                archivo:
                  type: string
                  format: binary
                  description: Archivo a subir
                kuuid:
                  type: string
                  description: Identificador único del archivo
                  example: 123e4567-e89b-12d3-a456-426614174000
                tipo:
                  type: string
                  description: Tipo de archivo
                  example: documento
              required: [archivo, kuuid, tipo]
      responses:
        '200':
          description: Archivo subido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Archivo subido correctamente
                  uuid:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          description: Faltan parámetros o archivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/gastos/descargararchivo/{id}:
    get:
      tags: [Archivos]
      summary: Descargar un archivo desde la base de datos por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Archivo descargado
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Archivo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/gastos/descargararchivonas/{id}:
    get:
      tags: [Archivos]
      summary: Descargar un archivo desde el NAS por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Archivo descargado
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Ruta no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Archivo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/crearfinca:
    post:
      tags: [Fincas]
      summary: Crear una nueva finca
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FincaInput'
      responses:
        '200':
          description: Finca creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Finca creada correctamente
                  kfinca:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/finca:
    put:
      tags: [Fincas]
      summary: Modificar una finca existente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FincaUpdate'
      responses:
        '200':
          description: Finca modificada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Finca modificada correctamente
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/finca/{kfinca}:
    delete:
      tags: [Fincas]
      summary: Eliminar una finca (borrado físico)
      security:
        - bearerAuth: []
      parameters:
        - name: kfinca
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Finca eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Finca eliminada correctamente
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fincas:
    get:
      tags: [Fincas]
      summary: Listar todas las fincas del agricultor autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de fincas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Finca'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trabajadores/activos:
    get:
      tags: [Trabajadores]
      summary: Listar trabajadores activos a la fecha actual
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de trabajadores activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trabajador'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trabajadores/activos/{fecha}:
    get:
      tags: [Trabajadores]
      summary: Listar trabajadores activos en una fecha específica
      security:
        - bearerAuth: []
      parameters:
        - name: fecha
          in: path
          required: true
          schema:
            type: string
            format: date
            example: 2025-04-24
      responses:
        '200':
          description: Lista de trabajadores activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trabajador'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trabajadores/insertarjornada:
    post:
      tags: [Trabajadores]
      summary: Insertar una nueva jornada para un trabajador
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ktrabajador:
                  type: string
                  example: 123e4567-e89b-12d3-a456-426614174000
                fecha:
                  type: string
                  format: date
                  example: 2025-04-24
              required: [ktrabajador]
      responses:
        '200':
          description: Jornada insertada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Jornada insertada correctamente
        '400':
          description: Faltan datos requeridos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Jornada ya existente para el trabajador y fecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listar/{tabla}:
    get:
      tags: [Genéricas]
      summary: Listar registros de una tabla específica para el agricultor autenticado
      security:
        - bearerAuth: []
      parameters:
        - name: tabla
          in: path
          required: true
          schema:
            type: string
            enum: [tblagricultores, tblalbaran, tblalbarandetalle, tblalmacen, tblaltatrabajador, tblArchivos, tblfinca, tblfincagastos, tbljornada, tblnota, tbloperacion, tbltrabajador]
            example: tblfinca
      responses:
        '200':
          description: Lista de registros
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Tabla no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listarcomun/{tabla}:
    get:
      tags: [Genéricas]
      summary: Listar registros de una tabla común (sin restricción por agricultor)
      security:
        - bearerAuth: []
      parameters:
        - name: tabla
          in: path
          required: true
          schema:
            type: string
            enum: [tblproducto, tbltipodeprecio, tbltipogasto, tbltipooperacion, tbltiposdeusuario]
            example: tblproducto
      responses:
        '200':
          description: Lista de registros
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Tabla no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/editar/{tabla}/{id}:
    put:
      tags: [Genéricas]
      summary: Editar un registro en una tabla específica
      security:
        - bearerAuth: []
      parameters:
        - name: tabla
          in: path
          required: true
          schema:
            type: string
            example: tblfinca
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                nombre_str: "Nuevo nombre"
                descripcion_str: "Nueva descripción"
      responses:
        '200':
          description: Registro actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Registro actualizado correctamente
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado o registro no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/eliminar/{tabla}/{id}:
    delete:
      tags: [Genéricas]
      summary: Marcar un registro como eliminado (borrado lógico)
      security:
        - bearerAuth: []
      parameters:
        - name: tabla
          in: path
          required: true
          schema:
            type: string
            example: tblfinca
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 123e4567-e89b-12d3-a456-426614174000
      responses:
        '200':
          description: Registro marcado como eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Registro marcado como eliminado
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado o registro no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/crear/{tabla}:
    post:
      tags: [Genéricas]
      summary: Crear un nuevo registro en una tabla específica
      security:
        - bearerAuth: []
      parameters:
        - name: tabla
          in: path
          required: true
          schema:
            type: string
            example: tbloperacion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                ktipooperacion: "456e4567-e89b-12d3-a456-426614174000"
                fechainicio_dtm: "2025-04-15 08:00:00"
                fechafin_dtm: "2025-04-15 18:00:00"
                descripcion_str: "Recolección de manzanas"
                numpersonas_int: 5
      responses:
        '200':
          description: Registro creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Registro insertado correctamente
                  tabla:
                    type: string
                    example: tbloperacion
                  uuid:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Tabla no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operaciones:
    get:
      tags: [Operaciones]
      summary: Listar todas las operaciones del agricultor autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de operaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Operacion'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/operaciones/{desde}/{hasta}:
    get:
      tags: [Operaciones]
      summary: Listar operaciones del agricultor entre dos fechas
      security:
        - bearerAuth: []
      parameters:
        - name: desde
          in: path
          required: true
          schema:
            type: string
            format: date
            example: 2025-04-01
        - name: hasta
          in: path
          required: true
          schema:
            type: string
            format: date
            example: 2025-04-30
      responses:
        '200':
          description: Lista de operaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Operacion'
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Gasto:
      type: object
      properties:
        kfincagasto:
          type: string
          description: Identificador único del gasto
        kagricultor:
          type: string
          description: Identificador del agricultor
        importe_flt:
          type: number
          description: Importe del gasto
        concepto_str:
          type: string
          description: Concepto del gasto
        campo4:
          type: string
          description: Campo adicional
        kfinca:
          type: string
          description: Identificador de la finca (opcional)
        ktipogasto:
          type: string
          description: Tipo de gasto (opcional)
        fecha_dtm:
          type: string
          format: date-time
          description: Fecha del gasto

    GastoInput:
      type: object
      properties:
        importe:
          type: number
          example: 150.75
        concepto:
          type: string
          example: Compra de fertilizantes
        campo4:
          type: string
          example: Detalle adicional
        kfinca:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        ktipogasto:
          type: string
          example: 456e4567-e89b-12d3-a456-426614174000
      required: [importe, concepto, campo4]

    AlbaranCabeceraInput:
      type: object
      properties:
        kalmacen:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        ktipoprecio:
          type: string
          example: 456e4567-e89b-12d3-a456-426614174000
        comentario:
          type: string
          example: Albarán para entrega de cosecha
        kfecha:
          type: string
          format: date
          example: 2025-04-24

    AlbaranDetalleInput:
      type: object
      properties:
        kalbaran:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        kg_float:
          type: number
          example: 500.25
        kproducto:
          type: string
          example: 456e4567-e89b-12d3-a456-426614174000
        numeropallets_int:
          type: integer
          example: 10
        numerocajas_int:
          type: integer
          example: 50
        precio_flt:
          type: number
          example: 1.25
        comentario_str:
          type: string
          example: Cajas de manzanas
      required: [kalbaran, kg_float, kproducto]

    AlbaranDetalle:
      type: object
      properties:
        kalbarandetalle:
          type: string
          description: Identificador único del detalle
        kalbaran:
          type: string
          description: Identificador del albarán
        linea_int:
          type: integer
          description: Número de línea (autogenerado por trigger)
        kg_float:
          type: number
          description: Peso en kilogramos
        numeropallets_int:
          type: integer
          description: Número de pallets
        numerocajas_int:
          type: integer
          description: Número de cajas
        precio_flt:
          type: number
          description: Precio por unidad
        kproducto:
          type: string
          description: Identificador del producto
        comentario_str:
          type: string
          description: Comentario adicional

    Finca:
      type: object
      properties:
        kfinca:
          type: string
          description: Identificador único de la finca
        kfincapadre:
          type: string
          description: Identificador de la finca padre (opcional)
        nombre_str:
          type: string
          description: Nombre de la finca
        descripcion_str:
          type: string
          description: Descripción de la finca
        kagricultor:
          type: string
          description: Identificador del agricultor
        Ubicacion_str:
          type: string
          description: Ubicación de la finca
        aream2_float:
          type: number
          description: Área en metros cuadrados
        campo1_str:
          type: string
          description: Campo adicional 1
        campo2_str:
          type: string
          description: Campo adicional 2
        fecha:
          type: string
          format: date-time
          description: Fecha de creación

    FincaInput:
      type: object
      properties:
        nombre_str:
          type: string
          example: Finca Los Olivos
        descripcion_str:
          type: string
          example: Finca de olivos para aceite
        kfincapadre:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        Ubicacion_str:
          type: string
          example: Camino Rural 123, Sevilla
        aream2_float:
          type: number
          example: 5000.0
        campo1_str:
          type: string
          example: Tipo de suelo: Arcilloso
        campo2_str:
          type: string
          example: Cultivo principal: Olivos
      required: [nombre_str]

    FincaUpdate:
      type: object
      properties:
        kfinca:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        kfincapadre:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        nombre_str:
          type: string
          example: Finca Los Olivos
        descripcion_str:
          type: string
          example: Finca de olivos para aceite
        Ubicacion_str:
          type: string
          example: Camino Rural 123, Sevilla
        aream2_float:
          type: number
          example: 5000.0
        campo1_str:
          type: string
          example: Tipo de suelo: Arcilloso
        campo2_str:
          type: string
          example: Cultivo principal: Olivos
      required: [kfinca]

    Trabajador:
      type: object
      properties:
        ktrabajador:
          type: string
          description: Identificador único del trabajador
        kagricultor:
          type: string
          description: Identificador del agricultor
        nombre_str:
          type: string
          description: Nombre del trabajador
        apellidos_str:
          type: string
          description: Apellidos del trabajador
        dni_str:
          type: string
          description: DNI del trabajador
        email_str:
          type: string
          description: Email del trabajador
        eliminado_bit:
          type: boolean
          description: Indica si el trabajador está eliminado

    Operacion:
      type: object
      properties:
        koperacion:
          type: string
          description: Identificador único de la operación
        kagricultor:
          type: string
          description: Identificador del agricultor
        ktipooperacion:
          type: string
          description: Tipo de operación
        fechainicio_dtm:
          type: string
          format: date-time
          description: Fecha de inicio de la operación
        fechafin_dtm:
          type: string
          format: date-time
          description: Fecha de fin de la operación
        descripcion_str:
          type: string
          description: Descripción de la operación
        numpersonas_int:
          type: integer
          description: Número de personas involucradas
        karchivos:
          type: string
          description: Identificador del archivo asociado (opcional)
        nombrearchivo_str:
          type: string
          description: Nombre del archivo asociado (opcional)
        formato_str:
          type: string
          description: Formato del archivo asociado (opcional)
        ktrabajador:
          type: string
          description: Identificador del trabajador asociado (opcional)
        nombre_str:
          type: string
          description: Nombre del trabajador asociado (opcional)

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Mensaje de error
        detalle:
          type: string
          description: Detalle adicional del error (opcional)

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
